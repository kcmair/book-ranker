spring:
  datasource:
    url: jdbc:h2:mem:bookranker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

bookranker:
  jwt:
    secret: bookranker-test-secret
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
