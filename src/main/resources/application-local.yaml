spring:
  datasource:
    url: jdbc:h2:mem:bookranker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true

  flyway:
    enabled: false

bookranker:
  jwt:
    secret: bookranker-local-development-secret-change-before-production
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
